name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Compile + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile + unit-test
        run: |
          ./gradlew \
            :testkit:compileDebugKotlin :testkit:testDebugUnitTest \
            :adapter-admob:compileDebugKotlin :adapter-admob:testDebugUnitTest \
            --stacktrace
