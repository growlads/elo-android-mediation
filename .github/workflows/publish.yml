name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      adapter_version: ${{ steps.ver.outputs.adapter_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: echo "$GPG_SIGNING_KEY" | gpg --batch --import

      - name: Publish to Maven Central
        run: ./gradlew :adapter-admob:publishAndReleaseToMavenCentral --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Read repo version
        id: ver
        run: |
          v=$(grep -E 'version = "[0-9.]+"' build.gradle.kts \
              | sed -E 's/.*"([0-9.]+)".*/\1/')
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Adapter version '$v' does not match X.Y.Z; aborting." >&2
            exit 1
          fi
          echo "adapter_version=$v" >> "$GITHUB_OUTPUT"

      - name: Tag the release
        env:
          ADAPTER_VERSION: ${{ steps.ver.outputs.adapter_version }}
        run: |
          tag="v${ADAPTER_VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi
